services:
  edm-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: edm-image
    container_name: edm-web-ele
    ports:
      - "80:80"  # 直接使用主機 80 Port 對應至容器內的 80 Port
    restart: always
    networks:
      - edm-network
    # --- [資安隔離] 使用域名通訊，不再需要 hardcoded IP 別名 ---
    # 健康檢查
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  edm-network:
    driver: bridge


#user  nobody;
worker_processes 1;

# 將錯誤日誌導向標準錯誤輸出，方便 docker logs 查看
error_log /dev/stderr warn;
pid        /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # 將存取日誌導向標準輸出
  access_log /dev/stdout;

  # 如果 mime.types 沒包含 mjs，額外補充在此
  types {
    application/javascript mjs;
  }

  sendfile on;
  # tcp_nopush     on;

  #keepalive_timeout  0;
  # keepalive_timeout 65;

  # gzip on;
  # gzip_buffers 32 16k;
  # gzip_comp_level 6;
  # gzip_min_length 1k;
  # gzip_static on;
  # gzip_types text/plain
  #   text/css
  #   application/javascript
  #   application/json
  #   application/x-javascript
  #   text/xml
  #   application/xml
  #   application/xml+rss
  #   text/javascript; #设置压缩的文件类型
  # gzip_vary on;

  server {
    listen 80;
    server_name uatedm.hwacom.com;

    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      index index.html;
      # 暫時開啟 CORS 以便透過 IP 直接進行除錯
      add_header 'Access-Control-Allow-Origin' '*';
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
      add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
    }

    # === [資安隱藏] 反向代理業務 API，隱藏後端實體域名 ===
    location /api/ {
      proxy_pass http://uatedmapi.hwacom.com/api/;
      
      proxy_set_header Host uatedmapi.hwacom.com;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === [資安隱藏] 反向代理 SSO 驗證 ===
    location /api-sso/ {
      # 🌟 增加解析器 (保證容器找得到 HWS)
      resolver 8.8.8.8 valid=30s;
      
      proxy_pass https://uathws.hwacom.com/api/;
      
      proxy_set_header Host uathws.hwacom.com;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # 🌟 核心：SSL 握手硬體對位
      proxy_ssl_server_name on;
      proxy_ssl_session_reuse off;
      proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
  }
}


#user  nobody;
worker_processes 1;

# 將錯誤日誌導向標準錯誤輸出，方便 docker logs 查看
error_log /dev/stderr warn;
pid        /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # 將存取日誌導向標準輸出
  access_log /dev/stdout;

  # 如果 mime.types 沒包含 mjs，額外補充在此
  types {
    application/javascript mjs;
  }

  sendfile on;
  # tcp_nopush     on;

  #keepalive_timeout  0;
  # keepalive_timeout 65;

  # gzip on;
  # gzip_buffers 32 16k;
  # gzip_comp_level 6;
  # gzip_min_length 1k;
  # gzip_static on;
  # gzip_types text/plain
  #   text/css
  #   application/javascript
  #   application/json
  #   application/x-javascript
  #   text/xml
  #   application/xml
  #   application/xml+rss
  #   text/javascript; #设置压缩的文件类型
  # gzip_vary on;

  server {
    listen 80;
    server_name uatedm.hwacom.com;

    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      index index.html;
    }

    # ✅ 反向代理 API 請求，避免 CORS 錯誤
    location /api {
      # 代理至 HWS UAT 後端 (以此網址為基礎，生產環境建議透過環境變數或專屬配置處理)
      proxy_pass http://uatuat.hwacom.com/api;
      proxy_set_header Host uathws.hwacom.com;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # 確保不傳遞來自後端的 CORS Header，改由代理層統一控管安全
      proxy_hide_header 'Access-Control-Allow-Origin';
    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
  }
}
